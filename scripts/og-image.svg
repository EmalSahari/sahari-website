<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="0.5" stop-color="#0f0a1f"/>
      <stop offset="1" stop-color="#080808"/>
    </linearGradient>
    <linearGradient id="logo" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <radialGradient id="glow1" cx="200" cy="150" r="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="1000" cy="500" r="450" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4f46e5" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <g transform="translate(90, 90)">
    <rect width="110" height="110" rx="24" fill="url(#logo)"/>
    <text x="55" y="55" text-anchor="middle" dominant-baseline="central" dy=".06em"
          font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="68" fill="#ffffff">S</text>
  </g>

  <text x="220" y="165" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="48" fill="#ffffff">Sahari</text>

  <text x="90" y="340" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="78" fill="#ffffff">Websites that look</text>
  <text x="90" y="430" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="78" fill="url(#accent)">as good as your work.</text>

  <text x="90" y="510" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="28" fill="#a1a1aa">Software studio · Websites, mobile apps, backends, custom tools</text>

  <text x="90" y="570" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="24" fill="#71717a">sahari.io</text>
</svg>
